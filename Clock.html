<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f0c29">
  <meta name="description" content="ChronoCore Pro - Ultimate Clock with Pomodoro, Cat Companion, Alarms">
  <title>ChronoCore Pro | Clock with Cat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-start: #0a0a2a;
      --bg-mid: #15153a;
      --bg-end: #0a0a2a;
      --surface: rgba(20, 25, 55, 0.7);
      --border: rgba(255, 255, 255, 0.12);
      --text-primary: #f0f3ff;
      --text-secondary: #a5b4fc;
      --accent: #c084fc;
      --accent-glow: #e879f9;
      --danger: #f87171;
      --success: #4ade80;
      --btn-bg: rgba(255, 255, 255, 0.08);
      --btn-hover: rgba(255, 255, 255, 0.18);
      --input-bg: rgba(0, 0, 0, 0.45);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    [data-theme="light"] {
      --bg-start: #e9efff;
      --bg-mid: #f5f9ff;
      --bg-end: #ffffff;
      --surface: rgba(245, 245, 255, 0.85);
      --border: rgba(100, 100, 140, 0.3);
      --text-primary: #1e1b4b;
      --text-secondary: #6366f1;
      --accent: #7c3aed;
      --btn-bg: #eef2ff;
      --btn-hover: #e0e7ff;
      --input-bg: rgba(255, 255, 255, 0.9);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at center, var(--bg-start), var(--bg-mid), var(--bg-end));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: background 0.4s;
      position: relative;
      overflow-x: hidden;
      touch-action: pan-y pinch-zoom; /* preserve scrolling */
    }

    /* Particle canvas */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
    }

    /* Following Cat */
    .following-cat {
      position: fixed;
      font-size: 48px;
      pointer-events: none;
      z-index: 10000;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
      transition: transform 0.05s linear;
      will-change: left, top;
    }
    @media (max-width: 768px) {
      .following-cat { font-size: 40px; }
    }
    @media (max-width: 480px) {
      .following-cat { font-size: 36px; }
    }

    /* Glass Card */
    .glass-card {
      max-width: 720px;
      width: 100%;
      background: var(--surface);
      backdrop-filter: blur(24px);
      border-radius: 48px;
      border: 1px solid var(--border);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      animation: floatIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      position: relative;
      z-index: 10;
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: scale(0.96) translateY(25px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Header */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 8px;
    }
    .icon-circle {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text-secondary);
    }
    @media (max-width: 480px) {
      .icon-circle { width: 42px; height: 42px; font-size: 1.1rem; }
    }

    /* Clock face */
    .clock-face { text-align: center; margin-bottom: 1.5rem; }
    .day-text { font-size: 0.75rem; letter-spacing: 3px; color: var(--text-secondary); }
    .date-full { font-size: clamp(0.85rem, 3.5vw, 1rem); font-weight: 500; color: var(--accent); margin: 0.2rem 0 0.8rem; }
    .time-big { display: flex; justify-content: center; align-items: baseline; gap: 8px; font-family: monospace; flex-wrap: wrap; }
    .hour-minute { font-size: clamp(2.5rem, 12vw, 4.2rem); font-weight: 700; letter-spacing: 4px; color: var(--text-primary); }
    .second-glow { font-size: clamp(1.2rem, 5vw, 1.6rem); font-weight: 500; color: var(--accent); animation: pulseSecond 1s infinite alternate; }
    .format-chip { background: var(--btn-bg); border: none; border-radius: 40px; padding: 6px 16px; font-size: 0.7rem; margin-top: 8px; color: var(--accent); cursor: pointer; }
    .world-time { background: var(--input-bg); border-radius: 40px; padding: 8px 14px; margin: 12px 0 0; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .tz-selector { background: transparent; border: 1px solid var(--border); color: var(--text-primary); padding: 6px 12px; border-radius: 40px; font-size: 0.7rem; cursor: pointer; }

    /* Tabs - responsive wrapping */
    .tabs {
      display: flex;
      gap: 6px;
      margin: 1.2rem 0 1rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      justify-content: center;
    }
    .tab {
      background: none;
      border: none;
      padding: 8px 14px;
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
    }
    @media (max-width: 500px) {
      .tab { padding: 6px 12px; font-size: 0.75rem; }
    }
    .tab.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4); }

    .panel { display: none; animation: fadePanel 0.3s; }
    .panel.active-panel { display: block; }
    @keyframes fadePanel { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Input groups */
    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      background: var(--input-bg);
      padding: 12px;
      border-radius: 56px;
      margin-bottom: 1rem;
      align-items: center;
      justify-content: center;
    }
    .time-input {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px;
      border-radius: 48px;
      text-align: center;
      width: 75px;
      font-size: 0.9rem;
    }
    @media (max-width: 480px) {
      .time-input { width: 65px; padding: 8px; }
    }
    button {
      background: var(--btn-bg);
      border: none;
      padding: 10px 16px;
      border-radius: 48px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: 0.2s;
    }
    button.primary { background: var(--accent); color: white; }
    button.danger { background: var(--danger); color: white; }
    .large-digit { font-size: clamp(1.8rem, 7vw, 2.8rem); font-family: monospace; text-align: center; margin: 12px 0; letter-spacing: 3px; font-weight: 600; }
    .alarm-item {
      background: var(--input-bg);
      border-radius: 48px;
      padding: 10px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .quote-box {
      background: var(--input-bg);
      border-radius: 32px;
      padding: 12px;
      margin-top: 1rem;
      text-align: center;
      font-size: 0.75rem;
      font-style: italic;
      color: var(--text-secondary);
    }
    .color-picker-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .color-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
    }
    hr { border-color: var(--border); margin: 12px 0; }
    .preset-buttons { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="following-cat" id="followingCat">🐱</div>
<canvas id="particleCanvas"></canvas>
<div class="glass-card">
  <div class="header-row">
    <div class="icon-circle" id="themeToggle">🌓</div>
    <div class="icon-circle" id="vibrateToggle" title="Vibration">📳</div>
    <div class="icon-circle" id="gradientPickerBtn" title="Background Themes">🎨</div>
  </div>

  <div class="clock-face">
    <div class="day-text" id="weekdayName"></div>
    <div class="date-full" id="gregDate"></div>
    <div class="time-big">
      <span class="hour-minute" id="hourMin">00:00</span>
      <span class="second-glow" id="secondDigit">00</span>
    </div>
    <button class="format-chip" id="formatToggle">12H</button>
    <div class="world-time">
      <span>🌍</span>
      <select id="timezoneSelect" class="tz-selector">
        <option value="local">Local</option><option value="UTC">UTC</option>
        <option value="America/New_York">New York</option><option value="Europe/London">London</option>
        <option value="Asia/Tokyo">Tokyo</option><option value="Asia/Dubai">Dubai</option>
      </select>
      <span id="tzOffset">UTC+0</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="timer">⏱️ Timer</button>
    <button class="tab" data-tab="pomodoro">🍅 Pomodoro</button>
    <button class="tab" data-tab="stopwatch">⏲️ Stopwatch</button>
    <button class="tab" data-tab="alarms">⏰ Alarms</button>
  </div>

  <!-- Timer Panel -->
  <div id="timerPanel" class="panel active-panel">
    <div class="input-group">
      <input type="number" id="timerH" placeholder="Hrs" min="0" value="0" class="time-input">
      <input type="number" id="timerM" placeholder="Min" min="0" value="1" class="time-input">
      <input type="number" id="timerS" placeholder="Sec" min="0" value="0" class="time-input">
    </div>
    <div class="preset-buttons">
      <button class="presetTimer" data-sec="60">1m</button><button class="presetTimer" data-sec="300">5m</button>
      <button class="presetTimer" data-sec="600">10m</button><button class="presetTimer" data-sec="900">15m</button>
    </div>
    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
      <button id="timerStart" class="primary">▶ Start</button>
      <button id="timerPause">⏸ Pause</button>
      <button id="timerReset">🔄 Reset</button>
    </div>
    <div class="large-digit" id="timerDisplay">00:00:00</div>
    <div id="timerStatus" style="text-align:center; font-size:0.8rem;">Ready</div>
  </div>

  <!-- Pomodoro Panel -->
  <div id="pomodoroPanel" class="panel">
    <div style="text-align:center; margin:8px 0;"><span id="pomoMode" style="background:var(--accent); padding:4px 16px; border-radius:40px;">Focus</span></div>
    <div class="large-digit" id="pomodoroDisplay">25:00</div>
    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
      <button id="pomoStart" class="primary">▶ Start</button>
      <button id="pomoPause">⏸ Pause</button>
      <button id="pomoReset">🔄 Reset</button>
      <button id="pomoSkip">⏩ Skip</button>
    </div>
    <div style="margin-top: 12px; text-align:center;">
      <button id="pomoSetFocus" style="padding:4px 12px;">Focus 25min</button>
      <button id="pomoSetBreak" style="padding:4px 12px;">Break 5min</button>
    </div>
  </div>

  <!-- Stopwatch -->
  <div id="stopwatchPanel" class="panel">
    <div class="large-digit" id="stopwatchDisplay">00:00:00.00</div>
    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
      <button id="swStart" class="primary">Start</button>
      <button id="swPause">Pause</button>
      <button id="swReset">Reset</button>
      <button id="swLap">📋 Lap</button>
    </div>
    <div class="lap-list" id="lapList" style="max-height:130px; overflow-y:auto; margin-top:12px;"></div>
  </div>

  <!-- Alarms with Snooze -->
  <div id="alarmsPanel" class="panel">
    <div class="input-group">
      <input type="time" id="newAlarmTime" step="60" style="flex:1; background:transparent; border:1px solid var(--border); padding:10px; border-radius:48px;">
      <button id="addAlarmBtn" class="primary">+ Add</button>
    </div>
    <div id="alarmsContainer"></div>
    <div style="font-size:0.7rem; text-align:center; margin-top: 8px;">🔔 Click Snooze to delay 5 min</div>
  </div>

  <div class="quote-box" id="quoteOfDay">✨ "Time flies, but you're the pilot."</div>
  <div class="color-picker-row" id="gradientPicker" style="display: none;">
    <div class="color-dot" data-grad="0" style="background: linear-gradient(135deg, #0f0c29, #302b63);"></div>
    <div class="color-dot" data-grad="1" style="background: linear-gradient(135deg, #1e1e3f, #3a3a6e);"></div>
    <div class="color-dot" data-grad="2" style="background: linear-gradient(135deg, #1a1a2e, #16213e);"></div>
    <div class="color-dot" data-grad="3" style="background: linear-gradient(135deg, #2b1b3d, #1e3c4c);"></div>
  </div>
</div>

<script>
  (function() {
    // ----------------------------- FOLLOWING CAT (cursor & touch) -----------------------------
    const cat = document.getElementById('followingCat');
    let targetX = window.innerWidth / 2, targetY = window.innerHeight / 2;
    let currentX = targetX, currentY = targetY;
    function updateCatPosition() {
      currentX += (targetX - currentX) * 0.2;
      currentY += (targetY - currentY) * 0.2;
      cat.style.left = (currentX - 24) + 'px';
      cat.style.top = (currentY - 24) + 'px';
      requestAnimationFrame(updateCatPosition);
    }
    updateCatPosition();

    function setTarget(e) {
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      targetX = clientX;
      targetY = clientY;
      // add playful meow effect on click/tap
      cat.style.transform = 'scale(1.2)';
      setTimeout(() => { cat.style.transform = 'scale(1)'; }, 150);
    }
    window.addEventListener('mousemove', setTarget);
    window.addEventListener('touchmove', setTarget);
    window.addEventListener('touchstart', setTarget);

    // ----------------------------- PARTICLE SYSTEM (stars) -----------------------------
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    document.addEventListener('mousemove', (e) => {
      for (let i = 0; i < 4; i++) particles.push({ x: e.clientX + (Math.random()-0.5)*12, y: e.clientY + (Math.random()-0.5)*12, size: Math.random()*4+2, life: 1, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2-1 });
    });
    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      for (let i = 0; i < 4; i++) particles.push({ x: touch.clientX + (Math.random()-0.5)*12, y: touch.clientY + (Math.random()-0.5)*12, size: Math.random()*4+2, life: 1, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2-1 });
    });
    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i=0; i<particles.length; i++) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if (p.life <= 0.02) { particles.splice(i,1); i--; continue; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255, 180, 100, ${p.life * 0.8})`;
        ctx.fill();
        ctx.shadowBlur = 6; ctx.shadowColor = "#c084fc";
      }
      ctx.shadowBlur = 0;
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    // ----------------------------- THEME & VIBRATION & GRADIENT -----------------------------
    let isDark = localStorage.getItem('theme') !== 'light';
    let vibration = localStorage.getItem('vibration') !== 'false';
    const root = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');
    const vibrateBtn = document.getElementById('vibrateToggle');
    const gradientBtn = document.getElementById('gradientPickerBtn');
    const gradientPicker = document.getElementById('gradientPicker');
    function applyTheme() { root.setAttribute('data-theme', isDark ? 'dark' : 'light'); themeBtn.textContent = isDark ? '☀️' : '🌙'; localStorage.setItem('theme', isDark ? 'dark' : 'light'); }
    themeBtn.addEventListener('click', () => { isDark = !isDark; applyTheme(); });
    applyTheme();
    function updateVibIcon() { vibrateBtn.textContent = vibration ? '📳' : '🔕'; }
    vibrateBtn.addEventListener('click', () => { vibration = !vibration; localStorage.setItem('vibration', vibration); updateVibIcon(); if(vibration && 'vibrate' in navigator) navigator.vibrate(50); });
    updateVibIcon();
    gradientBtn.addEventListener('click', () => { gradientPicker.style.display = gradientPicker.style.display === 'none' ? 'flex' : 'none'; });
    const gradients = ['linear-gradient(135deg, #0f0c29, #302b63)', 'linear-gradient(135deg, #1e1e3f, #3a3a6e)', 'linear-gradient(135deg, #1a1a2e, #16213e)', 'linear-gradient(135deg, #2b1b3d, #1e3c4c)'];
    document.querySelectorAll('.color-dot').forEach((dot, idx) => { dot.addEventListener('click', () => { document.body.style.background = gradients[idx]; localStorage.setItem('customGrad', gradients[idx]); }); });
    const savedGrad = localStorage.getItem('customGrad'); if(savedGrad) document.body.style.background = savedGrad;

    function playSoundAndVibrate() {
      try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine'; osc.frequency.value = 880; gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1); osc.start(); osc.stop(ctx.currentTime + 1); } catch(e) {}
      if (vibration && 'vibrate' in navigator) navigator.vibrate(300);
    }
    function notify(title, body) { playSoundAndVibrate(); if (Notification.permission === 'granted') new Notification(title, { body }); else if (Notification.permission !== 'denied') Notification.requestPermission(); const toast = document.createElement('div'); toast.textContent = `🔔 ${title}: ${body}`; toast.style.cssText = `position:fixed; bottom:20px; left:20px; right:20px; background:#c084fc; color:white; padding:12px; border-radius:48px; text-align:center; z-index:10001;`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 4000); }

    // ----------------------------- CLOCK & TIMEZONE -----------------------------
    let use24 = localStorage.getItem('clock24') === 'true';
    let currentTimezone = localStorage.getItem('selectedTimezone') || 'local';
    const tzSelect = document.getElementById('timezoneSelect');
    const tzOffsetSpan = document.getElementById('tzOffset');
    function getTimeInTimezone(tz) { if(tz === 'local') return new Date(); try { return new Date(new Date().toLocaleString('en-US', { timeZone: tz })); } catch(e) { return new Date(); } }
    function updateClock() {
      const now = getTimeInTimezone(currentTimezone);
      const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      document.getElementById('weekdayName').textContent = weekdays[now.getDay()];
      document.getElementById('gregDate').textContent = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
      let hours = now.getHours();
      const mins = now.getMinutes().toString().padStart(2,'0');
      const secs = now.getSeconds().toString().padStart(2,'0');
      let displayHM = use24 ? `${hours.toString().padStart(2,'0')}:${mins}` : `${(hours%12||12)}:${mins} ${hours>=12?'PM':'AM'}`;
      document.getElementById('hourMin').textContent = displayHM;
      document.getElementById('secondDigit').textContent = secs;
      const offset = -now.getTimezoneOffset(); const sign = offset>=0?'+':'-'; const offH = Math.floor(Math.abs(offset)/60); const offM = Math.abs(offset)%60;
      tzOffsetSpan.textContent = `UTC${sign}${offH}:${offM.toString().padStart(2,'0')}`;
    }
    document.getElementById('formatToggle').addEventListener('click', () => { use24 = !use24; localStorage.setItem('clock24', use24); updateClock(); });
    tzSelect.value = currentTimezone;
    tzSelect.addEventListener('change', (e) => { currentTimezone = e.target.value; localStorage.setItem('selectedTimezone', currentTimezone); updateClock(); });
    updateClock(); setInterval(updateClock, 200);

    const quotes = ["🐱 Time spent with cats is never wasted.", "🍅 Focus like a cat watching a bird.", "🌙 Paws and reflect on your progress.", "✨ Let your dreams leap like a cat.", "⏰ Every second is a whisker away."];
    document.getElementById('quoteOfDay').textContent = quotes[Math.floor(Math.random() * quotes.length)];

    // ----------------------------- TIMER (fully functional) -----------------------------
    let timerSeconds = 0, timerRunning = false, timerInterval = null;
    const timerH = document.getElementById('timerH'), timerM = document.getElementById('timerM'), timerS = document.getElementById('timerS');
    const timerDisplay = document.getElementById('timerDisplay'), timerStatus = document.getElementById('timerStatus');
    function updateTimerDisplay() { const hrs = Math.floor(timerSeconds/3600), mins = Math.floor((timerSeconds%3600)/60), secs = timerSeconds%60; timerDisplay.textContent = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; }
    function getSecondsFromFields() { return (parseInt(timerH.value)||0)*3600 + (parseInt(timerM.value)||0)*60 + (parseInt(timerS.value)||0); }
    function startTimer() { if(timerRunning) return; if(timerSeconds<=0) { timerSeconds = getSecondsFromFields(); if(timerSeconds<=0) { timerStatus.textContent="Set time"; return; } updateTimerDisplay(); } timerRunning=true; timerStatus.textContent="Running"; if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(() => { if(!timerRunning) return; if(timerSeconds<=1) { timerSeconds=0; updateTimerDisplay(); clearInterval(timerInterval); timerRunning=false; timerStatus.textContent="Finished!"; notify("Timer","Countdown done"); } else { timerSeconds--; updateTimerDisplay(); } }, 1000); }
    function pauseTimer() { if(timerRunning) { timerRunning=false; timerStatus.textContent="Paused"; if(timerInterval) clearInterval(timerInterval); } }
    function resetTimer() { pauseTimer(); timerSeconds = getSecondsFromFields(); updateTimerDisplay(); timerStatus.textContent="Ready"; }
    document.getElementById('timerStart').addEventListener('click', startTimer);
    document.getElementById('timerPause').addEventListener('click', pauseTimer);
    document.getElementById('timerReset').addEventListener('click', resetTimer);
    document.querySelectorAll('.presetTimer').forEach(btn => btn.addEventListener('click', () => { const secs = parseInt(btn.dataset.sec); timerSeconds = secs; timerH.value = Math.floor(secs/3600); timerM.value = Math.floor((secs%3600)/60); timerS.value = secs%60; updateTimerDisplay(); if(timerRunning) pauseTimer(); }));
    resetTimer();

    // ----------------------------- POMODORO -----------------------------
    let pomodoroSeconds = 25*60, pomodoroRunning = false, pomodoroInterval = null, pomoMode = "focus";
    const pomoDisplay = document.getElementById('pomodoroDisplay'), pomoModeSpan = document.getElementById('pomoMode');
    function updatePomoDisplay() { const mins = Math.floor(pomodoroSeconds/60), secs = pomodoroSeconds%60; pomoDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; }
    function pomoTick() { if(!pomodoroRunning) return; if(pomodoroSeconds<=1) { pomodoroSeconds=0; updatePomoDisplay(); clearInterval(pomodoroInterval); pomodoroRunning=false; notify("Pomodoro", pomoMode==="focus"?"Focus done! Take a break.":"Break finished. Back to work!"); if(pomoMode==="focus") setPomoMode("break",5*60); else setPomoMode("focus",25*60); } else { pomodoroSeconds--; updatePomoDisplay(); } }
    function setPomoMode(mode, seconds) { pomoMode=mode; pomodoroSeconds=seconds; updatePomoDisplay(); pomoModeSpan.textContent = mode==="focus"?"🍅 Focus":"☕ Break"; if(pomodoroRunning) { clearInterval(pomodoroInterval); pomodoroRunning=false; } }
    function startPomo() { if(pomodoroRunning) return; pomodoroRunning=true; if(pomodoroInterval) clearInterval(pomodoroInterval); pomodoroInterval = setInterval(pomoTick, 1000); }
    function pausePomo() { pomodoroRunning=false; if(pomodoroInterval) clearInterval(pomodoroInterval); }
    function resetPomo() { pausePomo(); setPomoMode(pomoMode, pomoMode==="focus"?25*60:5*60); }
    function skipPomo() { if(pomoMode==="focus") setPomoMode("break",5*60); else setPomoMode("focus",25*60); if(pomodoroRunning) startPomo(); }
    document.getElementById('pomoStart').addEventListener('click', startPomo);
    document.getElementById('pomoPause').addEventListener('click', pausePomo);
    document.getElementById('pomoReset').addEventListener('click', resetPomo);
    document.getElementById('pomoSkip').addEventListener('click', skipPomo);
    document.getElementById('pomoSetFocus').addEventListener('click', () => setPomoMode("focus",25*60));
    document.getElementById('pomoSetBreak').addEventListener('click', () => setPomoMode("break",5*60));
    setPomoMode("focus",25*60);

    // ----------------------------- STOPWATCH -----------------------------
    let swCenti=0, swRunning=false, swInterval=null;
    const swDisplay = document.getElementById('stopwatchDisplay'), lapDiv = document.getElementById('lapList');
    function formatSW(c) { const hrs = Math.floor(c/360000), mins = Math.floor((c%360000)/6000), secs = Math.floor((c%6000)/100), cs = c%100; return `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${cs.toString().padStart(2,'0')}`; }
    function updateSW() { swDisplay.textContent = formatSW(swCenti); }
    function startSW() { if(swRunning) return; swRunning=true; swInterval = setInterval(() => { swCenti++; updateSW(); }, 10); }
    function pauseSW() { swRunning=false; if(swInterval) clearInterval(swInterval); }
    function resetSW() { pauseSW(); swCenti=0; updateSW(); lapDiv.innerHTML=''; }
    function addLap() { if(!swRunning && swCenti===0) return; const lapTime = formatSW(swCenti); const lapItem = document.createElement('div'); lapItem.textContent = `Lap ${lapDiv.children.length+1}: ${lapTime}`; lapItem.style.cssText='background:var(--input-bg); margin:5px 0; padding:6px 12px; border-radius:40px; font-size:0.8rem;'; lapDiv.appendChild(lapItem); lapDiv.scrollTop = lapDiv.scrollHeight; }
    document.getElementById('swStart').addEventListener('click', startSW);
    document.getElementById('swPause').addEventListener('click', pauseSW);
    document.getElementById('swReset').addEventListener('click', resetSW);
    document.getElementById('swLap').addEventListener('click', addLap);
    resetSW();

    // ----------------------------- ALARMS WITH SNOOZE -----------------------------
    let alarms = [];
    const alarmsContainer = document.getElementById('alarmsContainer');
    function saveAlarms() { localStorage.setItem('chrono_alarms_v6', JSON.stringify(alarms.map(a => ({ id: a.id, time: a.time, enabled: a.enabled, snoozeUntil: a.snoozeUntil })))); }
    function loadAlarms() {
      const stored = localStorage.getItem('chrono_alarms_v6');
      if(stored) try { alarms = JSON.parse(stored).map(a => ({ ...a, triggeredToday: false, snoozeUntil: a.snoozeUntil || null })); } catch(e) {}
      if(!alarms.length) alarms = [{ id: Date.now(), time: "08:00", enabled: true, triggeredToday: false, snoozeUntil: null }];
      renderAlarms();
    }
    function renderAlarms() {
      alarmsContainer.innerHTML = '';
      alarms.forEach(alarm => {
        const div = document.createElement('div'); div.className = 'alarm-item';
        const timeSpan = document.createElement('span'); timeSpan.textContent = `⏰ ${alarm.time}`;
        const toggle = document.createElement('button'); toggle.textContent = alarm.enabled ? 'ON' : 'OFF'; toggle.style.background = alarm.enabled ? '#4ade80' : '#f87171';
        toggle.onclick = () => { alarm.enabled = !alarm.enabled; alarm.triggeredToday = false; alarm.snoozeUntil = null; saveAlarms(); renderAlarms(); };
        const snoozeBtn = document.createElement('button'); snoozeBtn.textContent = '⏰ Snooze'; snoozeBtn.onclick = () => { if(alarm.enabled) { const [hour, minute] = alarm.time.split(':'); let date = new Date(); date.setHours(parseInt(hour), parseInt(minute) + 5, 0); alarm.snoozeUntil = date.getTime(); alarm.triggeredToday = false; saveAlarms(); renderAlarms(); notify("Snooze", `Alarm snoozed to ${date.getHours()}:${date.getMinutes()}`); } };
        const del = document.createElement('button'); del.textContent = '🗑️'; del.onclick = () => { alarms = alarms.filter(a => a.id !== alarm.id); saveAlarms(); renderAlarms(); };
        div.append(timeSpan, toggle, snoozeBtn, del);
        alarmsContainer.appendChild(div);
      });
    }
    function addAlarm() { const val = document.getElementById('newAlarmTime').value; if(!val) return; const [hour, minute] = val.split(':'); const time24 = `${hour.padStart(2,'0')}:${minute.padStart(2,'0')}`; if(alarms.some(a => a.time === time24)) { alert('Alarm exists'); return; } alarms.push({ id: Date.now(), time: time24, enabled: true, triggeredToday: false, snoozeUntil: null }); saveAlarms(); renderAlarms(); document.getElementById('newAlarmTime').value = ''; }
    document.getElementById('addAlarmBtn').addEventListener('click', addAlarm);
    function checkAlarms() {
      const now = new Date();
      const current = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      alarms.forEach(alarm => {
        let shouldRing = false;
        if(alarm.snoozeUntil && alarm.snoozeUntil <= now.getTime()) { shouldRing = true; alarm.snoozeUntil = null; alarm.triggeredToday = false; }
        if(!shouldRing && alarm.enabled && !alarm.triggeredToday && alarm.time === current) shouldRing = true;
        if(shouldRing) { alarm.triggeredToday = true; notify("Alarm", `Time ${alarm.time}`); saveAlarms(); renderAlarms(); }
      });
      if(now.getHours()===0 && now.getMinutes()===0) { alarms.forEach(a => a.triggeredToday = false); saveAlarms(); renderAlarms(); }
    }
    setInterval(checkAlarms, 10000);
    loadAlarms(); checkAlarms();

    // Tabs
    const tabs = document.querySelectorAll('.tab');
    const panelsMap = { timer: document.getElementById('timerPanel'), pomodoro: document.getElementById('pomodoroPanel'), stopwatch: document.getElementById('stopwatchPanel'), alarms: document.getElementById('alarmsPanel') };
    tabs.forEach(tab => { tab.addEventListener('click', () => { const target = tab.dataset.tab; Object.values(panelsMap).forEach(p => p.classList.remove('active-panel')); panelsMap[target].classList.add('active-panel'); tabs.forEach(t => t.classList.remove('active')); tab.classList.add('active'); }); });
    if (Notification.permission === 'default') Notification.requestPermission();
  })();
</script>
</body>
